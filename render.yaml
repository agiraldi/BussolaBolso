services:
  - type: web
    name: bussola-bolso-backend
    runtime: node
    rootDirectory: backend
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromConfig: true
      - key: JWT_SECRET
        generateValue: true
